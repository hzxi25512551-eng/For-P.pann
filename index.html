<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เค้าขอโทษนะเตง... 🥺</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Kanit:wght@300&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #fff0f3;
            font-family: 'Itim', cursive;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(#ffcad4 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.2);
            text-align: center;
            max-width: 420px;
            width: 100%;
            border: 5px solid #ffcad4;
            position: relative;
        }
        .main-img {
            width: 140px;
            height: 140px;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
        }
        h1 {
            color: #ff4d6d;
            font-size: 2.3rem;
            margin-bottom: 15px;
        }
        p {
            color: #590d22;
            font-size: 1.35rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        button {
            padding: 16px;
            font-size: 1.35rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.2);
        }
        button:active {
            transform: scale(0.95);
        }
        #yes-btn1 {
            background: linear-gradient(to right, #ff4d6d, #ff758f);
            color: white;
        }
        #yes-btn2 {
            background: linear-gradient(to right, #ff758f, #ff8fa3);
            color: white;
        }
        
        /* หน้าเปิดกล่องดนตรี */
        #music-intro-section {
            display: block;
        }
        /* หน้าหลักและหน้าสำเร็จ ซ่อนไว้ก่อน */
        #ask-section, #success-section {
            display: none;
        }

        .gift-box {
            font-size: 80px;
            cursor: pointer;
            animation: pulse 1.5s infinite;
            display: inline-block;
            margin-bottom: 20px;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .special-msg {
            font-family: 'Kanit', sans-serif;
            font-size: 1.15rem;
            color: #ff4d6d;
            background: #fff0f3;
            padding: 25px 20px;
            border-radius: 25px;
            margin-top: 15px;
            border: 2px dashed #ff4d6d;
            line-height: 1.8;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }
        
        /* ซ่อนเครื่องเล่นเพลง YouTube ไว้ข้างหลัง */
        #youtube-player {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ซ่อนวิดีโอ YouTube เพลงง้อไว้ (จะเล่นเสียงอย่างเดียว) -->
        <div id="youtube-player"></div>

        <!-- หน้าที่ 1: หน้าเปิดกล่องของขวัญเพื่อเปิดเพลง -->
        <div id="music-intro-section">
            <div class="gift-box" onclick="startEverything()">🎁</div>
            <h1>มีของขวัญมาให้เทอ...</h1>
            <p>จิ้มที่กล่องของขวัญชิ้นนี้<br>เพื่อเปิดเสียงเพลงก่อนน้าาา 🎵</p>
        </div>

        <!-- หน้าที่ 2: หน้าง้อ -->
        <div id="ask-section">
            <img class="main-img" src="https://media.tenor.com/2t13L7eA5d8AAAAi/mochi-peach.gif" alt="ง้อ">
            <h1>เทอจ๋าา...</h1>
            <p>เค้าขอโทษน้าาา ดีกันนะคนดี<br>หายโกรธเค้านะคะ 🥺💖</p>
            
            <div class="btn-group">
                <!-- เปลี่ยนเป็นปุ่มให้อภัยทั้งคู่ เลือกกดอันไหนก็ได้ผลเหมือนกัน -->
                <button id="yes-btn1" onclick="forgive()">ให้อภัย</button>
                <button id="yes-btn2" onclick="forgive()">ให้อภัยมากๆ ❤️</button>
            </div>
        </div>

        <!-- หน้าที่ 3: หน้าหลังกดให้อภัย -->
        <div id="success-section">
            <img class="main-img" src="https://media.tenor.com/z7G0z8Zl3vQAAAAi/love-cute.gif" alt="รัก">
            <h1>ขอบคุณนะอ้วนรร</h1>
            <div class="special-msg">
                เค้าจะปรับปรุงตัวให้ดีขึ้นกว่านี้นะคะ<br>
                รักพี่แพนนมากๆน้าาาา ❤️<br>
                <small style="color: #ff8fa3; display: block; margin-top: 12px; font-weight: bold;">
                    (เว็ปนี้เค้านั่งทำตั้งนานเพราะต้องเขียนโค้ดเลยนะ!)
                </small>
            </div>
        </div>
    </div>

    <!-- โหลดสคริปต์สำหรับควบคุม YouTube -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        const videoId = 'dYvA9t2lGco'; // ID เพลงง้อจาก YouTube

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '1',
                width: '1',
                videoId: videoId,
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'loop': 1,
                    'playlist': videoId
                }
            });
        }

        function startEverything() {
            if (player && typeof player.playVideo === 'function') {
                player.playVideo();
            }
            document.getElementById('music-intro-section').style.display = 'none';
            document.getElementById('ask-section').style.display = 'block';
        }

        function forgive() {
            document.getElementById('ask-section').style.display = 'none';
            document.getElementById('success-section').style.display = 'block';
        }
    </script>
</body>
</html>
