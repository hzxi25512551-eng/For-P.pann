<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เค้าขอโทษนะเตง...</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
            backdrop-filter: blur(5px);
        }

        h1 {
            color: #ff4d6d;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #590d22;
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .gif-container {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 60px;
            align-items: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        #yes-btn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        #yes-btn:hover {
            transform: scale(1.1);
            background-color: #ff758f;
        }

        #no-btn {
            background-color: #a3a3a3;
            color: white;
            position: absolute; /* จำเป็นสำหรับการหลบ */
            z-index: 10;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* หน้าจอหลังจากยอมให้อภัย */
        .success-screen {
            display: none;
        }

        .success-screen h1 {
            color: #2a9d8f;
        }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <!-- หน้าแรก (ง้อ) -->
        <div id="ask-section">
            <div class="gif-container">🥺💖</div>
            <h1>ดีกันนะ...</h1>
            <p>เค้าขอโทษน้าาา อย่าโกรธเค้าเลยนะเทอ เค้าสัญญาว่าจะทำตัวให้ดีขึ้น ดีกันนะคะ 🥺✨</p>
            
            <div class="btn-group">
                <button id="yes-btn" onclick="forgive()">ให้อภัย</button>
                <button id="no-btn" onmouseover="escapeBtn()" onclick="escapeBtn()" ontouchstart="escapeBtn()">ไม่ให้อภัย</button>
            </div>
        </div>

        <!-- หน้าหลังจากกด "ให้อภัย" -->
        <div id="success-section" class="success-screen">
            <div class="gif-container">🎉🥰</div>
            <h1>เย้! รักเทอนะ</h1>
            <p>เย้! ขอบคุณที่ให้อภัยเค้านะคะ น่ารักที่สุดเลยยยย เดี๋ยวเค้าพาไปกินของอร่อยๆ นะ! ❤️</p>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const askSection = document.getElementById('ask-section');
        const successSection = document.getElementById('success-section');

        // ฟังก์ชันทำให้ปุ่มวิ่งหนี
        function escapeBtn() {
            // คำนวณขอบเขตการวิ่งหนีภายในหน้าจอ
            const maxWidth = window.innerWidth - noBtn.offsetWidth - 40;
            const maxHeight = window.innerHeight - noBtn.offsetHeight - 40;

            // สุ่มตำแหน่งใหม่
            const randomX = Math.floor(Math.random() * maxWidth);
            const randomY = Math.floor(Math.random() * maxHeight);

            // ย้ายปุ่มไปที่ตำแหน่งแบบ Absolute เทียบกับหน้าจอ
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // ฟังก์ชันเมื่อกด "ให้อภัย"
        function forgive() {
            askSection.style.display = 'none';
            successSection.style.display = 'block';
            
            // เอฟเฟกต์หัวใจกระจายแบบง่ายๆ
            for (let i = 0; i < 30; i++) {
                createHeart();
            }
        }

        // สร้างหัวใจลอยๆ
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = Math.random() * 20 + 20 + 'px';
            heart.style.opacity = Math.random();
            heart.style.pointerEvents = 'none';
            heart.style.transition = 'transform 3s linear, opacity 3s linear';
            
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.style.transform = `translateY(-110vh) rotate(${Math.random() * 360}deg)`;
                heart.style.opacity = '0';
            }, 100);

            setTimeout(() => {
                heart.remove();
            }, 3000);
        }
    </script>
</body>
</html>
