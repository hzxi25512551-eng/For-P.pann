<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เค้าขอโทษนะเตง... 🥺</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Kanit:wght@300&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #fff0f3;
            font-family: 'Itim', cursive;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.15);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 4px solid #ffcad4;
        }
        .emoji {
            font-size: 70px;
            margin-bottom: 15px;
            display: block;
        }
        h1 {
            color: #ff4d6d;
            font-size: 2.2rem;
            margin-bottom: 15px;
        }
        p {
            color: #590d22;
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        button {
            padding: 15px;
            font-size: 1.3rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.98);
        }
        #yes-btn {
            background: linear-gradient(to right, #ff4d6d, #ff758f);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
        }
        #no-btn {
            background-color: #f0f0f0;
            color: #777777;
        }
        #success-section {
            display: none;
        }
        .special-msg {
            font-family: 'Kanit', sans-serif;
            font-size: 1.1rem;
            color: #ff4d6d;
            background: #fff0f3;
            padding: 20px;
            border-radius: 20px;
            margin-top: 15px;
            border: 2px dashed #ffcad4;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="ask-section">
            <span class="emoji">🧸</span>
            <h1>เทอจ๋าา...</h1>
            <p>เค้าขอโทษน้าาา ดีกันนะคนดี<br>หายโกรธเค้านะคะ 🥺💖</p>
            
            <div class="btn-group">
                <button id="yes-btn" onclick="forgive()">ให้อภัย</button>
                <button id="no-btn" onclick="notForgive()">ไม่ให้อภัย</button>
            </div>
        </div>

        <div id="success-section">
            <span class="emoji">💖🥰✨</span>
            <h1>ขอบคุณนะอ้วนรร</h1>
            <div class="special-msg">
                เค้าจะปรับปรุงตัวให้ดีขึ้นกว่านี้นะคะ<br>
                รักพี่แพนนมากๆน้าาาา ❤️<br>
                <small style="color: #ff8fa3; display: block; margin-top: 10px;">
                    (เว็ปนี้เค้านั่งทำตั้งนานเพราะต้องเขียนโค้ดเลยนะ!)
                </small>
            </div>
        </div>
    </div>

    <script>
        function forgive() {
            document.getElementById('ask-section').style.display = 'none';
            document.getElementById('success-section').style.display = 'block';
        }

        function notForgive() {
            alert('งื้อออ ให้อภัยเค้าเถอะนะเทอ เค้าสำนึกผิดแล้วจริงๆ นะคะ 🥺❤️');
        }
    </script>
</body>
</html>
