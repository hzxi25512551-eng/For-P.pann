<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ถึงพี่แพน ❤️</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:"Tahoma",sans-serif;
    background:linear-gradient(135deg,#ff8dc7,#a78bfa,#60a5fa);
    color:white;
}

.page{
    width:100%;
    height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.page.active{
    display:flex;
}

.box{
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(15px);
    padding:40px;
    border-radius:35px;
    max-width:600px;
    box-shadow:0 0 50px rgba(255,255,255,.4);
}

h1{
    font-size:45px;
    margin-bottom:20px;
    text-shadow:0 0 20px pink;
}

p{
    font-size:22px;
    line-height:1.8;
}

#timer{
    margin:20px;
    font-size:25px;
    font-weight:bold;
}

button{
    margin:15px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:#ff4fa3;
    color:white;
    font-size:20px;
    cursor:pointer;
    box-shadow:0 0 20px #ff4fa3;
}

button:hover{
    transform:scale(1.1);
}


/* หัวใจ */

.heart{
    position:absolute;
    bottom:-50px;
    animation:up 8s linear infinite;
}

@keyframes up{
    to{
        transform:translateY(-110vh) rotate(360deg);
        opacity:0;
    }
}


/* ดอกไม้ */

.flower{
    position:absolute;
    top:-30px;
    animation:fall 7s linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}


.big{
    font-size:65px;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    50%{
        transform:scale(1.2);
    }
}

</style>
</head>


<body>


<!-- หน้า 1 -->

<div class="page active">

<div class="box">

<h1>❤️ ถึงพี่แพน ❤️</h1>

<p>
เค้ามีอะไรอยากให้เท๊อดู<br>
พร้อมยังงงง 💕
</p>

<button onclick="nextPage()">
เปิดเซอร์ไพรส์ 💌
</button>

</div>

</div>



<!-- หน้า 2 -->

<div class="page">

<div class="box">

<h1>⏳ เวลาของเรา</h1>

<p>
เค้ากับพี่แพนคบกันมาแล้ว
</p>

<div id="timer"></div>

<button onclick="nextPage()">
ไปต่อ ❤️
</button>

</div>

</div>



<!-- หน้า 3 -->

<div class="page">

<div class="box">

<h1>💌 ถึงพี่แพน</h1>

<p>
ขอบคุณที่เข้ามาเป็นความสุขของเค้านะ<br><br>

ทุกวันที่มีเท๊ออยู่<br>
มันเป็นวันที่พิเศษมากเลย<br><br>

<strong>
เค้ารักเท๊อออออ ❤️
</strong>

</p>


<button onclick="nextPage()">
กดอีกครั้ง 💖
</button>

</div>

</div>



<!-- หน้า 4 -->

<div class="page">

<div class="box">

<div class="big">
❤️
</div>


<h1>
พี่แพน
</h1>


<p>
เค้าจะอยู่ข้างเท๊อ<br>
และรักเท๊อไปนาน ๆ นะ 💕

</p>


<button onclick="firework()">
เซอร์ไพรส์สุดท้าย 🎆
</button>

</div>

</div>



<script>


let pages=document.querySelectorAll(".page");

let current=0;


function nextPage(){

pages[current].classList.remove("active");

current++;

if(current>=pages.length)
current=pages.length-1;


pages[current].classList.add("active");

}




// เวลาเริ่มคบ

let start=new Date("2026-04-15T00:00:00");


function count(){

let now=new Date();

let diff=now-start;


let d=Math.floor(diff/86400000);

let h=Math.floor(diff/3600000)%24;

let m=Math.floor(diff/60000)%60;

let s=Math.floor(diff/1000)%60;


document.getElementById("timer").innerHTML=
`
${d} วัน<br>
${h} ชั่วโมง
${m} นาที
${s} วินาที
`;

}


setInterval(count,1000);
count();




// สร้างหัวใจ

function createHeart(){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"%";

h.style.fontSize=
20+Math.random()*40+"px";

h.style.animationDuration=
4+Math.random()*5+"s";


document.body.appendChild(h);


setTimeout(()=>{
h.remove()
},8000);

}

setInterval(createHeart,300);



// ดอกไม้

function flower(){

let f=document.createElement("div");

f.className="flower";

f.innerHTML="🌸";

f.style.left=Math.random()*100+"%";

f.style.animationDuration=
5+Math.random()*5+"s";


document.body.appendChild(f);


setTimeout(()=>{
f.remove()
},9000);

}

setInterval(flower,500);



// เอฟเฟกต์สุดท้าย

function firework(){

for(let i=0;i<30;i++){

let h=document.createElement("div");

h.innerHTML="💖";

h.style.position="absolute";

h.style.left="50%";

h.style.top="50%";

h.style.fontSize="40px";

h.style.transform=
`translate(${Math.random()*500-250}px,
${Math.random()*500-250}px)`;

h.style.transition="2s";

document.body.appendChild(h);

setTimeout(()=>{
h.style.opacity=0;
},100);

setTimeout(()=>{
h.remove();
},2000);

}

}

</script>

</body>
</html>
